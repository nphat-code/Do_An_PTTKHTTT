<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Laptop Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">
    <div class="auth-container" style="max-width: 500px;">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Đăng Ký Thành Viên</h2>
                <p>Khám phá thế giới Laptop đỉnh cao cùng chúng tôi</p>
            </div>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Họ và tên <span style="color:red;">*</span></label>
                        <input type="text" id="fullName" required placeholder="Nguyễn Văn A" autocomplete="off">
                    </div>
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label><i class="fas fa-venus-mars"></i> Giới tính</label>
                        <select id="gender" class="form-select">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar-alt"></i> Ngày sinh</label>
                        <input type="date" id="birthdate">
                    </div>
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email <span style="color:red;">*</span></label>
                        <input type="email" id="email" required placeholder="email@domain.com" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Số điện thoại</label>
                        <input type="text" id="phone" placeholder="09xxxxxxxx" autocomplete="off">
                    </div>
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Mật khẩu <span style="color:red;">*</span></label>
                        <div class="password-container">
                            <input type="password" id="password" required placeholder="••••••••" minlength="6"
                                autocomplete="new-password">
                            <i class="fas fa-eye toggle-password" id="togglePasswordBtn1"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-shield-alt"></i> Xác nhận</label>
                        <div class="password-container">
                            <input type="password" id="confirmPassword" required placeholder="••••••••"
                                autocomplete="new-password">
                            <i class="fas fa-eye toggle-password" id="togglePasswordBtn2"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
                    <input type="text" id="address" placeholder="Nhập địa chỉ của bạn..." autocomplete="off">
                </div>

                <button type="submit" class="btn-submit">Bắt đầu ngay <i class="fas fa-arrow-right"
                        style="margin-left: 8px;"></i></button>
            </form>
            <div class="auth-footer">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                <div style="margin-top: 20px;">
                    <a href="/" class="back-home"><i class="fas fa-home"></i> Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        function toggleVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('togglePasswordBtn1').addEventListener('click', function () {
            toggleVisibility('password', 'togglePasswordBtn1');
        });
        document.getElementById('togglePasswordBtn2').addEventListener('click', function () {
            toggleVisibility('confirmPassword', 'togglePasswordBtn2');
        });
    </script>
</body>

</html>
