<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - P-Tech Laptop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
        }

        .detail-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .breadcrumb a {
            color: #6366f1;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .product-image-section {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 16px;
            padding: 30px;
            min-height: 400px;
        }

        .product-image-section img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 12px;
        }

        .product-image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            font-size: 5rem;
        }

        .product-info-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .product-brand {
            display: inline-block;
            background: #eef2ff;
            color: #4f46e5;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            width: fit-content;
        }

        .product-category {
            display: inline-block;
            background: #f0fdf4;
            color: #16a34a;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            width: fit-content;
            margin-left: 8px;
        }

        .product-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1.3;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 800;
            color: #dc2626;
        }

        .product-price .original {
            font-size: 1rem;
            color: #94a3b8;
            text-decoration: line-through;
            margin-left: 10px;
            font-weight: 500;
        }

        .stock-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .stock-badge.in-stock {
            color: #16a34a;
        }

        .stock-badge.out-of-stock {
            color: #dc2626;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-add-cart {
            flex: 1;
            padding: 16px 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-add-cart:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-buy-now {
            padding: 16px 30px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-buy-now:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        /* Specs Section */
        .specs-section {
            margin-top: 30px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .specs-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .specs-title i {
            color: #6366f1;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0;
        }

        .spec-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .spec-row:hover {
            background: #f8fafc;
        }

        .spec-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .spec-icon.cpu {
            background: #fef3c7;
            color: #d97706;
        }

        .spec-icon.ram {
            background: #dbeafe;
            color: #2563eb;
        }

        .spec-icon.storage {
            background: #dcfce7;
            color: #16a34a;
        }

        .spec-icon.gpu {
            background: #fce7f3;
            color: #db2777;
        }

        .spec-icon.display {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .spec-icon.battery {
            background: #d1fae5;
            color: #059669;
        }

        .spec-icon.weight {
            background: #f3e8ff;
            color: #7c3aed;
        }

        .spec-label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .spec-value {
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 600;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            font-size: 1.2rem;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
                padding: 20px;
                gap: 20px;
            }

            .product-title {
                font-size: 1.3rem;
            }

            .product-price {
                font-size: 1.5rem;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header
        style="background: white; padding: 15px 5%; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 1000; margin-bottom: 0;">
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color);">
            <a href="/" style="text-decoration: none; color: inherit;">
                <i class="fas fa-laptop"></i> P-Tech Laptop
            </a>

        </div>

        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="/" style="text-decoration: none; color: #64748b; font-weight: 500; font-size: 0.95rem;">
                <i class="fas fa-home"></i> Trang chủ
            </a>
            <div id="cartIcon" onclick="openCart()" style="position: relative; cursor: pointer;">
                <i class="fas fa-shopping-cart" style="font-size: 1.3rem; color: var(--text-color);"></i>
                <span id="cartCount"
                    style="position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 0.7rem; padding: 1px 5px; border-radius: 20px;">0</span>
            </div>
            <span id="authLinks" style="font-size: 0.9rem;"></span>
        </div>
    </header>

    <div class="detail-container">
        <div class="breadcrumb">
            <a href="/"><i class="fas fa-home"></i> Trang chủ</a>
            <span>/</span>
            <span id="breadcrumbName">Đang tải...</span>
        </div>

        <div id="loadingSpinner" class="loading-spinner">
            <div><i class="fas fa-spinner fa-spin"></i> Đang tải thông tin sản phẩm...</div>
        </div>

        <div id="productDetailContent" style="display: none;">
            <div class="product-detail">
                <div class="product-image-section" id="productImageSection">
                </div>

                <div class="product-info-section">
                    <div>
                        <span class="product-brand" id="productBrand"></span>
                        <span class="product-category" id="productCategory"></span>
                    </div>
                    <h1 class="product-title" id="productTitle"></h1>
                    <div class="product-price" id="productPrice"></div>
                    <div id="stockBadge" class="stock-badge"></div>
                    <p style="color: #64748b; font-size: 0.9rem; line-height: 1.6;" id="productDesc"></p>

                    <div class="action-buttons">
                        <button class="btn-add-cart" id="btnAddCart" onclick="addToCartDetail()">
                            <i class="fas fa-cart-plus"></i> Thêm vào giỏ hàng
                        </button>
                    </div>
                </div>
            </div>

            <div class="specs-section">
                <div class="specs-title">
                    <i class="fas fa-microchip"></i> Thông số kỹ thuật
                </div>
                <div class="specs-grid" id="specsGrid">
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal (giống trang chủ) -->
    <div id="cartModal" class="modal">
        <div class="modal-content" style="width: 600px;">
            <div class="modal-header">
                <h2>Giỏ hàng của bạn</h2>
                <i class="fas fa-times close-btn" onclick="closeCart()"></i>
            </div>
            <div id="cartItemsContainer" style="padding: 20px; max-height: 400px; overflow-y: auto;"></div>
            <div class="modal-footer" style="display: block;">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold;">
                    <span>Tổng cộng:</span>
                    <span id="cartTotal" style="color: var(--primary-color);">0đ</span>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button type="button" onclick="closeCart()" class="btn-secondary"
                        style="width: 100%; margin: 0;">Tiếp tục mua sắm</button>
                    <a href="checkout.html" class="btn-primary" style="text-decoration:none; text-align:center;">Thanh
                        toán</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/product-detail.js"></script>
</body>

</html>
